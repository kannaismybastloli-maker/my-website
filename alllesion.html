<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ບົບຮຽນທັງໝົດ/title>
<!-- Latest Bootstrap min CSS -->
	<link rel="stylesheet" href="../../eduleb/eduleb/assets/fonts/themify-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../eduleb/eduleb/assets/css/jquery-simple-mobilemenu.css">						
	<link rel="stylesheet" href="../../eduleb/eduleb/assets/css/style.css">	
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1e2230;
    min-height: 100vh;
    font-family: Georgia, serif;
    padding: 16px;
  }

  .grid-wrap {
    display: grid;
	margin-left: 80px;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .tag-card {
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    /* padding: 32px 16px; */
	width: 200px;
	height: 100px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    user-select: none;
    text-align: center;
  }

  .tag-card:hover { transform: scale(1.05); opacity: 0.88; }
  .tag-card:active { transform: scale(0.97); }

  .beige  { background: #d8d4cc; color: #3a3730; }
  .teal   { background: #8ecfc4; color: #1a4a44; }
  .cyan   { background: #7ec8d0; color: #164a50; }
  .pink   { background: #f4a8b4; color: #6b1f2e; }
  .yellow { background: #e8e080; color: #4a4410; }
  .rose   { background: #c8b8b0; color: #3a2820; }
  .mint   { background: #a8d8c8; color: #1a4438; }
  .sage   { background: #b8ccc0; color: #1e3828; }

  @media (max-width: 600px) {
    .grid-wrap { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="grid-wrap">
  <div class="tag-card beige">R</div>
  <div class="tag-card teal">Kotlin</div>
  <div class="tag-card cyan">Node.js</div>
  <div class="tag-card pink">React</div>

  <div class="tag-card yellow">JSON</div>
  <div class="tag-card rose">Vue</div>
  <div class="tag-card mint">MySQL</div>
  <div class="tag-card teal">XML</div>

  <div class="tag-card pink">Sass</div>
  <div class="tag-card yellow">Icons</div>
  <div class="tag-card beige">RWD</div>
  <div class="tag-card sage">Graphics</div>

  <div class="tag-card cyan">SVG</div>
  <div class="tag-card pink">Canvas</div>
  <div class="tag-card yellow">Raspberry Pi</div>
  <div class="tag-card rose">Cyber Security</div>

  <div class="tag-card teal">Python</div>
  <div class="tag-card beige">TypeScript</div>
  <div class="tag-card yellow">Docker</div>
  <div class="tag-card mint">PostgreSQL</div>
</div>

</body>
</html>
